name: Release PR

# On every push to main: let git-cliff work out the next semver from the
# conventional-commit history. If a release is due, open (or update) a PR that
# bumps CHANGELOG.md + Cargo.toml. Merging that PR triggers tag-release.yml.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: false

jobs:
  release-pr:
    name: Open / update Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: cliff_version
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --bumped-version

      - name: Check if release is needed
        id: version
        run: |
          NEXT=$(echo "${{ steps.cliff_version.outputs.content }}" | tr -d '[:space:]')
          if [ -z "$NEXT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BARE="${NEXT#v}"
          # Already in CHANGELOG.md → just released, nothing to do.
          if grep -qF "## [$BARE]" CHANGELOG.md 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "bare=$BARE" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        if: steps.version.outputs.skip == 'false'
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --bump --output CHANGELOG.md

      - name: Bump workspace version in Cargo.toml
        if: steps.version.outputs.skip == 'false'
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.bare }}"/' Cargo.toml
          # Deliberately NOT running `cargo generate-lockfile`: it rebuilds the
          # whole dependency graph and busts caches for no gain here. Cargo.lock's
          # local-package version is cosmetic for a solo binary, and CI never
          # builds with --locked. (Lesson from the netscope release flow.)

      - name: Generate release notes for PR body
        id: notes
        if: steps.version.outputs.skip == 'false'
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --unreleased --strip header

      - name: Create or update Release PR
        if: steps.version.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: release/next
          base: main
          title: "chore: release ${{ steps.version.outputs.next }}"
          body: ${{ steps.notes.outputs.content }}
          labels: autorelease
          commit-message: "chore: release ${{ steps.version.outputs.next }}"
          delete-branch: false
